name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.x
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run check:unicode
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

      # coverage invokes scripts/run-tests.mjs, so this is the single full test-suite pass.
      - run: npm run coverage
      - run: npm run pack:smoke
      - run: npm run atree:validate
      - run: npm run atree:evaluate
      - run: npm run atree -- doctor --project . --strict
      - run: npm run atree -- export --project . --format mermaid
      - run: npm run atree:route -- --text "Add subscription billing with tests and docs" --json
      - name: Smoke test goal planning
        shell: bash
        run: |
          printf "Add subscription billing with tests and docs\n" > /tmp/atree-goal.md
          npm run atree:goal -- --file /tmp/atree-goal.md --auto-route --review-required
      - run: npm run atree -- scope --prompt "Fix the README typo" --json
      - run: npm run assessment:pack -- --no-diff --no-runs --no-lessons --no-mission-runtime
      - run: npm run self:loop -- --assessment-pack-only
