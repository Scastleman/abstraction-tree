name: Install or package problem
description: Report trouble installing Abstraction Tree or running the packaged CLI.
title: "[install]: "
labels: ["install", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing Abstraction Tree. Please redact secrets, private paths, and private source code. Do not paste full `.abstraction-tree/` memory unless a maintainer asks for a specific file.
  - type: input
    id: os
    attributes:
      label: OS
      description: Example: Windows 11, macOS 15, Ubuntu 24.04.
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node and npm versions
      description: Paste `node --version` and `npm --version`.
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command run
      description: Paste the exact install or CLI command.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include redacted error output.
      render: text
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Redacted doctor output
      description: If install succeeded, paste redacted `npx atree doctor --json`.
      render: json
  - type: dropdown
    id: shareable
    attributes:
      label: Can the target project be shared?
      options:
        - "No"
        - "Yes, publicly"
        - "Yes, privately if needed"
    validations:
      required: true
